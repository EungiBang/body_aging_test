<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3바디 통합건강 AI솔루션 포스터</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root {
            --bg-color: #0A1628;
            --accent-cyan: #00D4FF;
            --accent-gold: #FFD700;
            --text-white: #FFFFFF;
            --text-gray: #B0BEC5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background-color: #333; /* 브라우저 여백 배경 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* A3 세로 사이즈 비율 (297mm x 420mm) */
        .poster {
            position: relative;
            width: 297mm;
            height: 420mm;
            background: linear-gradient(145deg, var(--bg-color) 0%, #1a0b2e 100%);
            color: var(--text-white);
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            padding: 40px;
            z-index: 1;
        }

        /* 배경 데코레이션 효과 */
        .poster::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.1) 0%, transparent 60%);
            z-index: -1;
            pointer-events: none;
        }

        /* 1. 상단 기관 로고 영역 */
        .header-logos {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
            font-weight: 600;
            font-size: 22px;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.9);
        }
        
        .header-logos span.cross {
            color: var(--accent-cyan);
            font-size: 18px;
        }

        /* 2. 메인 타이틀 영역 */
        .title-section {
            text-align: center;
            margin-top: 80px;
            flex-shrink: 0;
        }

        .sub-title {
            color: var(--accent-gold);
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 25px;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
            letter-spacing: 2px;
        }

        .main-title {
            font-size: 74px;
            font-weight: 900;
            line-height: 1.25;
            letter-spacing: -2px;
            text-shadow: 0px 4px 20px rgba(0, 212, 255, 0.3);
            word-break: keep-all;
        }

        .highlight {
            color: var(--accent-cyan);
        }

        /* 3. 시각 요소 (몸, 얼굴, 뇌 아이콘) */
        .visual-display {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: auto;
            margin-bottom: auto;
            position: relative;
            padding: 0 20px;
        }

        .measure-circle {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 2;
            transition: transform 0.3s ease;
        }

        .measure-circle.cyan-glow {
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
            border-color: rgba(0, 212, 255, 0.4);
        }

        .measure-circle.gold-glow {
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
            border-color: rgba(255, 215, 0, 0.4);
        }

        .measure-circle.purple-glow {
            box-shadow: 0 0 40px rgba(186, 104, 200, 0.3);
            border-color: rgba(186, 104, 200, 0.4);
        }

        .circle-icon {
            font-size: 70px;
            margin-bottom: 20px;
        }

        .circle-label {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        /* 중앙 연결선 효과 */
        .connecting-line {
            position: absolute;
            top: 50%;
            left: 10%;
            right: 10%;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-gold), #BA68C8);
            z-index: 1;
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
            opacity: 0.6;
        }

        /* 4. 이벤트 배너 영역 */
        .event-banner {
            background: linear-gradient(90deg, #FF9100 0%, #FFD700 100%);
            color: #111;
            padding: 30px 40px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 50px;
            box-shadow: 0 15px 30px rgba(255, 215, 0, 0.3);
            position: relative;
        }

        .badge {
            background-color: #E53935;
            color: white;
            font-size: 20px;
            font-weight: 800;
            padding: 8px 16px;
            border-radius: 30px;
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .event-text {
            font-size: 54px;
            font-weight: 900;
            letter-spacing: -1px;
            margin-top: 10px;
        }

        .event-sub-text {
            font-size: 28px;
            font-weight: 700;
            margin-top: 15px;
            opacity: 0.9;
        }

        /* 5. 꼬리말/연락처 영역 */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 30px;
            margin-bottom: 20px;
        }

        .contact-info {
            flex-grow: 1;
        }

        .contact-title {
            font-size: 24px;
            color: var(--text-gray);
            margin-bottom: 10px;
        }

        .contact-detail {
            font-size: 34px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qr-placeholder {
            width: 140px;
            height: 140px;
            background: white;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            font-weight: bold;
            font-size: 16px;
            text-align: center;
            padding: 10px;
            border: 5px solid white;
        }

        /* 인쇄 설정 */
        @media print {
            body { 
                background: white; 
                padding: 0;
            }
            .poster {
                box-shadow: none;
                width: 297mm;
                height: 420mm;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>
    <div class="poster">
        <!-- 상단 기관 로고 -->
        <div class="header-logos">
            한국뇌과학연구원 <span class="cross">✕</span> 글로벌사이버대학교 <span class="cross">✕</span> 브레인트레이닝센터
        </div>

        <!-- 메인 헤드라인 -->
        <div class="title-section">
            <div class="sub-title">3바디 통합건강 AI솔루션</div>
            <h1 class="main-title">
                AI가 정밀하게 측정하는<br>
                당신의 <span class="highlight">몸·얼굴·뇌 나이</span>
            </h1>
        </div>

        <!-- 중앙 비주얼/아이콘 영역 -->
        <div class="visual-display">
            <div class="connecting-line"></div>
            
            <div class="measure-circle cyan-glow">
                <div class="circle-icon">🏃‍♂️</div>
                <div class="circle-label" style="color:var(--accent-cyan)">몸 나이</div>
            </div>
            
            <div class="measure-circle gold-glow">
                <div class="circle-icon">😊</div>
                <div class="circle-label" style="color:var(--accent-gold)">얼굴 나이</div>
            </div>
            
            <div class="measure-circle purple-glow">
                <div class="circle-icon">🧠</div>
                <div class="circle-label" style="color:#BA68C8">뇌 나이</div>
            </div>
        </div>

        <!-- 무료 체험 배너 -->
        <div class="event-banner">
            <div class="badge">기간 한정 특별 이벤트</div>
            <div class="event-text">🎉 기기 도입 기념 무료 진단 체험!</div>
            <div class="event-sub-text">숨겨진 당신의 진짜 노화 속도를 확인해보세요</div>
        </div>

        <!-- 하단 정보 영역 -->
        <div class="footer">
            <div class="contact-info">
                <div class="contact-title">가까운 센터를 방문하여 전문가의 1:1 상담을 받아보세요</div>
                <div class="contact-detail">
                    📍 전국 브레인트레이닝센터 지점
                </div>
                <div style="font-size: 20px; color: var(--accent-cyan); margin-top: 15px;">
                    ※ 지점별 예약 문의 및 방문 접수 가능
                </div>
            </div>
            <div class="qr-placeholder">
                이곳에<br>QR코드<br>부착 가능
            </div>
        </div>
    </div>
</body>
</html>
