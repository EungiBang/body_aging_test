<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>천부경 타로</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="importmap">
    {
      "imports": {
        "react": "https://aistudiocdn.com/react@^19.2.0",
        "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
        "react/": "https://aistudiocdn.com/react@^19.2.0/",
        "@google/genai": "https://aistudiocdn.com/@google/genai@^1.25.0",
        "react-markdown": "https://aistudiocdn.com/react-markdown@^10.1.0",
        "remark-gfm": "https://aistudiocdn.com/remark-gfm@^4.0.1"
      }
    }
  </script>
  <style>
    @property --angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }

    :root {
      --bg-dark: #0f0c29;
      --text-light: #e0e0e0;
      --text-gold: #f0c370;
      --text-dark: #333;
      --shadow-light: rgba(0, 0, 0, 0.1);
      --shadow-dark: rgba(0, 0, 0, 0.5);
    }
    body {
      background-color: var(--bg-dark);
      color: var(--text-light);
      font-family: 'Noto Sans KR', sans-serif;
      line-height: 1.7;
    }
    .font-serif {
      font-family: 'Gowun Batang', serif;
    }

    .text-center {
      text-align: center;
    }

    .glass-card {
      background: rgba(23, 17, 65, 0.5);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 10px 30px var(--shadow-dark);
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .glass-card::before {
        content: '';
        position: absolute;
        top: 0; right: 0; bottom: 0; left: 0;
        z-index: -1;
        margin: -2px; 
        border-radius: inherit; 
        background: conic-gradient(from var(--angle), #89fffd 0%, #ef32d9 50%, #89fffd 100%);
        animation: rotate-angle 6s linear infinite;
    }

    @keyframes rotate-angle {
      to {
        --angle: 360deg;
      }
    }
    
    h1, h2, h3 {
       font-family: 'Gowun Batang', serif;
       color: var(--text-light);
       font-weight: 700;
    }
    
    .title-main {
      font-size: 2.8rem;
      color: var(--text-gold);
      text-shadow: 0 2px 10px rgba(240, 195, 112, 0.5);
    }
    .title-sub {
      font-family: 'Noto Sans KR', sans-serif;
      color: #b0a5d4;
      letter-spacing: 0.1em;
      font-size: 0.9rem;
    }
    
    hr {
      border: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(137, 255, 253, 0.3), transparent);
      margin: 1.5rem 0;
    }
    
    textarea, input, select {
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(137, 255, 253, 0.2);
      color: #ffffff;
      transition: all 0.3s ease;
      border-radius: 8px;
      width: 100%;
      padding: 0.75rem 1rem;
    }
    textarea:focus, input:focus, select:focus {
      border-color: rgba(137, 255, 253, 0.7);
      box-shadow: 0 0 12px rgba(137, 255, 253, 0.2);
      outline: none;
    }
    textarea::placeholder, input::placeholder {
      color: #b0a595;
    }
    
    textarea {
      resize: vertical;
      min-height: 120px;
      background: radial-gradient(circle at 0% 50%, #f0c37040, #3d339380 50%, #171141 100%), rgba(0,0,0,0.5);
    }

    select {
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg fill="%2389fffd" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
      background-repeat: no-repeat;
      background-position: right 0.7rem center;
      background-size: 1.5em;
    }
    
    .primary-button {
      background: linear-gradient(90deg, #4f46e5, #c026d3);
      color: white;
      font-weight: bold;
      border: none;
      transition: all 0.3s ease;
      border-radius: 8px;
      padding: 0.8rem 1.5rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      text-shadow: 0 1px 1px rgba(0,0,0,0.2);
    }
    .primary-button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(192, 38, 211, 0.4);
    }
     .primary-button:disabled {
      background: #5a5a7a;
      cursor: not-allowed;
      box-shadow: none;
    }

    .secondary-button {
      background-color: rgba(255,255,255,0.1);
      color: var(--text-light);
      font-weight: bold;
      border: 1px solid rgba(255,255,255,0.2);
      transition: all 0.3s ease;
    }
    .secondary-button:hover {
       background-color: rgba(255,255,255,0.2);
    }
    
    /* Master Card Styles */
    .golden-master-card {
      background: linear-gradient(145deg, #d4af37, #b4862c, #f0c370, #a0701c);
      box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.2), inset 0 -2px 4px rgba(0, 0, 0, 0.2), 0 5px 15px rgba(0,0,0,0.3);
    }

    /* Result styles */
    .prose { color: var(--text-light); line-height: 1.8; }
    .prose h3 { font-family: 'Gowun Batang', serif; color: var(--text-gold); border-bottom: 1px solid rgba(240, 195, 112, 0.3); padding-bottom: 0.3em; font-size: 1.5rem; margin-top: 2em; margin-bottom: 1em;}
    .prose strong { color: #fff; font-weight: 600; }
    .prose ul { list-style-type: none; padding-left: 0; }
    .prose li { position: relative; padding-left: 1.75em; margin-bottom: 0.75em; }
    .prose li::before {
      content: '✧';
      position: absolute;
      left: 0;
      color: var(--text-gold);
      font-size: 1.2em;
      top: -0.1em;
    }
    
    /* Result Interpretation Card */
    .result-interpretation-card {
      background-color: #fdfdfa;
      color: var(--text-dark);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 10px 30px var(--shadow-dark);
    }
    
    .prose-dark { color: var(--text-dark); }
    .prose-dark h3 { font-family: 'Gowun Batang', serif; color: #b4862c; border-bottom: 1px solid rgba(180, 134, 44, 0.3); padding-bottom: 0.3em; font-size: 1.5rem; margin-top: 2em; margin-bottom: 1em;}
    .prose-dark strong { color: #000; font-weight: 600; }
    .prose-dark ul { list-style-type: none; padding-left: 0; }
    .prose-dark li { position: relative; padding-left: 1.75em; margin-bottom: 0.75em; }
    .prose-dark li::before {
      content: '✧';
      position: absolute;
      left: 0;
      color: #c89c4a;
      font-size: 1.2em;
      top: -0.1em;
    }

    .golden-stick-card {
      background: linear-gradient(145deg, #d4af37, #b4862c, #f0c370, #a0701c);
      box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.2), inset 0 -2px 4px rgba(0, 0, 0, 0.2), 0 5px 15px rgba(0,0,0,0.3);
    }

    /* Card Container Scrollbar */
    .card-container::-webkit-scrollbar {
      width: 8px;
    }
    .card-container::-webkit-scrollbar-track {
      background: rgba(15, 12, 41, 0.2);
      border-radius: 10px;
    }
    .card-container::-webkit-scrollbar-thumb {
      background-color: var(--text-gold);
      border-radius: 10px;
      border: 2px solid transparent;
      background-clip: content-box;
    }
    .card-container::-webkit-scrollbar-thumb:hover {
      background-color: #ffdf99;
    }

    .recording-pulse {
      animation: pulse-recording 1.5s ease-in-out infinite;
      background-color: rgba(239, 68, 68, 0.5) !important;
      color: white !important;
    }

    @keyframes pulse-recording {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
      }
      50% {
        transform: scale(1.05);
        box-shadow: 0 0 10px 10px rgba(239, 68, 68, 0);
      }
    }

    /* Animation */
    .animate-fade-in {
      animation: fade-in 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(30px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Print Styles */
    @media print {
      body {
        background-color: #fff;
        color: #000;
      }
      .no-print {
        display: none !important;
      }
      main {
        padding: 0;
      }
      .result-interpretation-card {
        box-shadow: none;
        border: 1px solid #ccc;
        padding: 1.5rem;
      }
      .prose-dark, .prose-dark * {
        color: #000 !important;
      }
      .prose-dark h3 {
        color: #333 !important;
        border-color: #ccc !important;
      }
      .golden-stick-card {
        background: #f0f0f0 !important;
        box-shadow: none !important;
        border: 1px solid #ccc;
        -webkit-print-color-adjust: exact;
        color-adjust: exact;
      }
      .golden-stick-card * {
        color: #000 !important;
        text-shadow: none !important;
      }
      h2 {
        color: #000 !important;
        text-shadow: none !important;
      }
      p {
        color: #333 !important;
      }
    }
  </style>
<link rel="stylesheet" href="/index.css">
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
