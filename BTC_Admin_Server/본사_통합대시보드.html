<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>브레인트레이닝센터 본사 관리자 대시보드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
    body { font-family: 'Noto Sans KR', sans-serif; }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f8fafc; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    
    .hidden { display: none !important; }
  </style>
</head>
<body class="bg-slate-50 h-screen overflow-hidden flex flex-col">

<!-- Login Page -->
<div id="login-screen" class="fixed inset-0 z-50 bg-slate-900 flex items-center justify-center p-4">
  <div class="bg-white rounded-3xl p-10 max-w-sm w-full text-center shadow-2xl relative overflow-hidden">
    <div class="absolute top-0 left-0 w-full h-2 bg-indigo-500"></div>
    <div class="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl shadow-inner">
      <i class="fas fa-user-shield"></i>
    </div>
    <h1 class="text-2xl font-black text-slate-800 mb-2">본사 관리자 시스템</h1>
    <p class="text-slate-500 mb-8 font-medium text-sm">접근 권한 확인이 필요합니다.</p>
    
    <input type="password" id="password-input" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-4 text-center text-xl tracking-widest font-bold focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-100 mb-4 transition-all" placeholder="비밀번호 입력">
    
    <button id="login-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-indigo-200 transition-all">
      대시보드 열기
    </button>
  </div>
</div>

<!-- Dashboard Page -->
<div id="dashboard-screen" class="hidden flex-1 flex flex-col h-full overflow-hidden">
  
  <!-- Header -->
  <div class="bg-white border-b border-slate-200 px-8 py-6 flex items-center justify-between shrink-0 shadow-sm relative z-20">
    <div class="flex items-center gap-4">
      <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-xl shadow-lg shadow-indigo-200">
        <i class="fas fa-network-wired"></i>
      </div>
      <div>
        <h1 class="text-2xl font-black text-slate-800 leading-tight">통합 설치 현황판</h1>
        <p class="text-slate-500 font-medium text-sm mt-0.5">총 <span id="total-count" class="text-indigo-600 font-bold">0</span>개 지점 시스템 개통 확인됨</p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <button id="refresh-btn" class="px-5 py-3 bg-white border border-slate-200 text-slate-600 font-bold rounded-xl hover:bg-slate-50 transition-all flex items-center gap-2">
        <i class="fas fa-sync-alt" id="refresh-icon"></i> <span class="hidden sm:inline">새로고침</span>
      </button>
      <button id="export-btn" class="px-5 py-3 bg-emerald-50 text-emerald-600 font-bold rounded-xl hover:bg-emerald-100 transition-all flex items-center gap-2">
        <i class="fas fa-file-excel"></i> <span class="hidden sm:inline">엑셀 백업 (.csv)</span>
      </button>
    </div>
  </div>

  <!-- Content -->
  <div class="flex-1 p-8 overflow-hidden flex flex-col max-w-7xl mx-auto w-full relative z-10">
    
    <!-- Search Bar -->
    <div class="mb-6 relative shrink-0">
      <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
      <input type="text" id="search-input" placeholder="지점명 또는 원장님 이름으로 즉시 검색..." class="w-full pl-14 pr-6 py-4 rounded-2xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm font-bold text-slate-700 text-lg transition-all bg-white" />
    </div>

    <!-- Table Container -->
    <div class="flex-1 bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
      <div class="overflow-x-auto flex-1 relative">
        <table class="w-full text-left border-collapse whitespace-nowrap min-w-[800px]">
          <thead class="bg-indigo-50/50 sticky top-0 z-10 shadow-sm backdrop-blur-sm">
            <tr>
              <th class="px-8 py-5 text-xs font-black text-slate-500 uppercase tracking-wider border-b border-slate-200 w-16">No.</th>
              <th class="px-8 py-5 text-xs font-black text-slate-500 uppercase tracking-wider border-b border-slate-200">AI분석기 개통 지점명</th>
              <th class="px-8 py-5 text-xs font-black text-slate-500 uppercase tracking-wider border-b border-slate-200">책임 관리자 (원장)</th>
              <th class="px-8 py-5 text-xs font-black text-slate-500 uppercase tracking-wider border-b border-slate-200">연락처</th>
              <th class="px-8 py-5 text-xs font-black text-slate-500 uppercase tracking-wider border-b border-slate-200">설치 기사</th>
              <th class="px-8 py-5 text-xs font-black text-slate-500 uppercase tracking-wider border-b border-slate-200 text-center text-indigo-600">오늘 진단수</th>
              <th class="px-8 py-5 text-xs font-black text-slate-500 uppercase tracking-wider border-b border-slate-200 text-center">누적 진단수</th>
              <th class="px-8 py-5 text-xs font-black text-slate-500 uppercase tracking-wider border-b border-slate-200 text-right">시스템 개통 일시</th>
              <th class="px-8 py-5 text-xs font-black text-slate-500 uppercase tracking-wider border-b border-slate-200 text-center w-24">관리</th>
            </tr>
          </thead>
          <tbody id="table-body" class="divide-y divide-slate-100">
            <!-- Loading State -->
            <tr>
              <td colspan="8" class="px-8 py-32 text-center text-slate-400 font-bold text-lg">
                <i class="fas fa-circle-notch fa-spin text-4xl mb-4 text-indigo-400 block"></i>
                전국 지점 데이터를 동기화 중입니다...<br>
                <span class="text-sm font-normal text-slate-400 mt-2 block">인터넷 연결을 확인해 주세요.</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, getDocs, query, orderBy, limit, doc, getDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // Firebase Config
  const firebaseConfig = {
    projectId: "gen-lang-client-0150517299",
    appId: "1:956526317530:web:bec8dceedfce29e52dfae3",
    apiKey: "AIzaSyCDJ-1MaCTlduQPqowwXRo7PBW0gBYasLs",
    authDomain: "gen-lang-client-0150517299.firebaseapp.com"
  };

  const app = initializeApp(firebaseConfig);
  // Using the specific database ID as configured
  const db = getFirestore(app, "ai-studio-7438736e-bdac-4efd-8b91-800d4e373fe1");

  // DOM Elements
  const loginScreen = document.getElementById('login-screen');
  const dashboardScreen = document.getElementById('dashboard-screen');
  const pwInput = document.getElementById('password-input');
  const loginBtn = document.getElementById('login-btn');
  const tableBody = document.getElementById('table-body');
  const searchInput = document.getElementById('search-input');
  const refreshBtn = document.getElementById('refresh-btn');
  const refreshIcon = document.getElementById('refresh-icon');
  const exportBtn = document.getElementById('export-btn');
  const totalCountEl = document.getElementById('total-count');

  let allBranches = [];

  // 보안: SHA-256 해시 함수
  const hashPassword = async (password) => {
    const encoder = new TextEncoder();
    const data = encoder.encode(password);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  };

  // 1. Password Verification (Firestore 기반 인증으로 전환 - 하드코딩 패스워드 제거)
  const verifyPassword = async () => {
    try {
      const configDoc = await getDoc(doc(db, 'system_settings', 'dashboard_auth'));
      if (!configDoc.exists()) {
        alert('인증 설정이 존재하지 않습니다. 본사에 문의해주세요.');
        return;
      }
      const storedHash = configDoc.data().passwordHash;
      const inputHash = await hashPassword(pwInput.value);
      if (inputHash === storedHash) {
        loginScreen.classList.add('hidden');
        dashboardScreen.classList.remove('hidden');
        fetchData();
      } else {
        alert('비밀번호가 일치하지 않습니다.');
        pwInput.value = '';
        pwInput.focus();
      }
    } catch (e) {
      console.error('인증 오류:', e);
      alert('인증 서버 연결에 실패했습니다.');
    }
  };

  loginBtn.addEventListener('click', verifyPassword);
  pwInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') verifyPassword();
  });

  // 2. Fetch Data from Firebase
  const fetchData = async () => {
    refreshIcon.classList.add('fa-spin');
    tableBody.innerHTML = `
      <tr>
        <td colspan="8" class="px-8 py-32 text-center text-slate-400 font-bold text-lg">
          <i class="fas fa-circle-notch fa-spin text-4xl mb-4 text-indigo-400 block"></i>
          전국 지점 데이터를 동기화 중입니다...
        </td>
      </tr>
    `;

    try {
      const q = query(collection(db, 'installations'));
      
      // Use onSnapshot for real-time updates
      onSnapshot(q, (querySnapshot) => {
        const loadedData = [];
        querySnapshot.forEach((doc) => {
          loadedData.push({ id: doc.id, ...doc.data() });
        });

      // Sort by verifiedAt descending (newest first)
      loadedData.sort((a, b) => {
        const timeA = a.verifiedAt ? new Date(a.verifiedAt).getTime() : 0;
        const timeB = b.verifiedAt ? new Date(b.verifiedAt).getTime() : 0;
        return timeB - timeA;
      });

        allBranches = loadedData;
        totalCountEl.textContent = allBranches.length;
        renderTable(allBranches);
        refreshIcon.classList.remove('fa-spin');
      }, (error) => {
        console.error(error);
        tableBody.innerHTML = `
          <tr>
            <td colspan="8" class="px-8 py-32 text-center text-rose-500 font-bold text-lg">
              <i class="fas fa-exclamation-triangle text-4xl mb-4 block"></i>
              데이터를 불러오지 못했습니다.<br>
              <span class="text-sm font-normal text-slate-500 mt-2 block">${error.message}</span>
            </td>
          </tr>
        `;
        refreshIcon.classList.remove('fa-spin');
      });

    } catch (error) {
      console.error(error);
      tableBody.innerHTML = `
        <tr>
          <td colspan="8" class="px-8 py-32 text-center text-rose-500 font-bold text-lg">
            <i class="fas fa-exclamation-triangle text-4xl mb-4 block"></i>
            데이터를 불러오지 못했습니다.<br>
            <span class="text-sm font-normal text-slate-500 mt-2 block">${error.message}</span>
          </td>
        </tr>
      `;
    }
  };

  refreshBtn.addEventListener('click', () => {
    fetchData();
    searchInput.value = '';
  });

  // 3. Render Table
  const renderTable = (data) => {
    if (data.length === 0) {
      tableBody.innerHTML = `
        <tr>
          <td colspan="8" class="px-8 py-32 text-center text-slate-400 font-bold text-lg">
            <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-300">
              <i class="fas fa-search text-2xl"></i>
            </div>
            조건에 맞는 개통 내역이 없습니다.
          </td>
        </tr>
      `;
      return;
    }

    let html = '';
    data.forEach((b, index) => {
      const dateStr = b.verifiedAt ? new Date(b.verifiedAt).toLocaleString() : '-';
      const no = data.length - index;
      
      const d = new Date();
      const todayStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      const cumulative = b.cumulativeCount || 0;
      const todayCount = (b.lastDiagnosisDate === todayStr) ? (b.todayCount || 0) : 0;
      
      html += `
        <tr class="hover:bg-indigo-50/40 transition-colors group">
          <td class="px-8 py-4 text-sm font-bold text-slate-400 cursor-default">${no}</td>
          <td class="px-8 py-4 text-base font-black text-slate-800 cursor-default">${b.branchName || '-'}</td>
          <td class="px-8 py-4 text-base font-bold text-slate-600 cursor-default">${b.adminName || '-'}</td>
          <td class="px-8 py-4 text-sm font-bold text-slate-500 tracking-wider cursor-default">${b.contact || '-'}</td>
          <td class="px-8 py-4 text-sm font-medium text-slate-500 cursor-default">${b.installer || '-'}</td>
          <td class="px-8 py-4 text-lg font-black text-indigo-600 bg-indigo-50/20 text-center cursor-default tracking-wide">${todayCount}명</td>
          <td class="px-8 py-4 text-base font-bold text-slate-600 bg-slate-50/50 text-center cursor-default">${cumulative}명</td>
          <td class="px-8 py-4 text-sm font-bold text-slate-400 bg-slate-50/20 text-right cursor-default">
            ${dateStr}
          </td>
          <td class="px-8 py-4 text-center rounded-r-xl bg-slate-50/20 group-hover:bg-indigo-100/50">
            <button onclick="deleteBranch('${b.id}', '${b.branchName}')" class="w-8 h-8 rounded-full bg-rose-50 text-rose-500 hover:bg-rose-500 hover:text-white transition-all flex items-center justify-center mx-auto" title="기록 삭제">
              <i class="fas fa-trash-alt text-xs"></i>
            </button>
          </td>
        </tr>
      `;
    });
    
    tableBody.innerHTML = html;
  };

  // 4. Search Filter
  searchInput.addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase().trim();
    if (!term) {
      renderTable(allBranches);
      return;
    }
    
    const filtered = allBranches.filter(b => {
      return (b.branchName && b.branchName.toLowerCase().includes(term)) || 
             (b.adminName && b.adminName.toLowerCase().includes(term));
    });
    renderTable(filtered);
  });

  // 5. Export to CSV
  exportBtn.addEventListener('click', () => {
    if (allBranches.length === 0) {
      alert('백업할 데이터가 없습니다.');
      return;
    }

    const headers = ['지점명', '책임 관리자', '연락처', '설치 담당자', '최초 개통 일시', '누적 진단수', '오늘 진단수'];
    const csvRows = [headers.join(',')];
    
    const d = new Date();
    const todayStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;

    allBranches.forEach(b => {
      const dateStr = b.verifiedAt ? new Date(b.verifiedAt).toLocaleString() : '';
      const cumulative = b.cumulativeCount || 0;
      const todayCount = (b.lastDiagnosisDate === todayStr) ? (b.todayCount || 0) : 0;

      const row = [
        `"${b.branchName || ''}"`,
        `"${b.adminName || ''}"`,
        `"${b.contact || ''}"`,
        `"${b.installer || ''}"`,
        `"${dateStr}"`,
        `"${cumulative}"`,
        `"${todayCount}"`
      ];
      csvRows.push(row.join(','));
    });
    
    // Convert to CSV with BOM for Excel Korean support
    const csvContent = "\\uFEFF" + csvRows.join('\\n');
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    
    const link = document.createElement("a");
    link.setAttribute("href", url);
    
    const today = new Date().toISOString().split('T')[0];
    link.setAttribute("download", `BTC_시스템설치_개통현황_${today}.csv`);
    
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  });

  // 6. Delete Data
  window.deleteBranch = async (docId, branchName) => {
    if (confirm(`'${branchName}' 지점의 설치 개통 기록을 정말 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`)) {
      try {
        await deleteDoc(doc(db, 'installations', docId));
        alert('성공적으로 삭제되었습니다.');
        fetchData(); // Refresh list after deletion
      } catch (error) {
        console.error("Error deleting document: ", error);
        alert('삭제 중 오류가 발생했습니다. 권한을 확인해주세요.');
      }
    }
  };
</script>
</body>
</html>
